apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-1-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-1
  template:
    metadata:
      labels:
        app: service-1
    spec:
      containers:
        - name: service-1
          image: IMAGE_SERVICE_1
          ports:
            - containerPort: 8001
          env:
            - name: SERVICE_2_URL
              value: "http://service-2-service:8002"